<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resonair AI – Cough Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── LIGHT THEME ── */
    :root {
      --bg: #EEF4FF;
      --nav-bg: rgba(238, 244, 255, 0.88);
      --text-dark: #0B1120;
      --text-muted: #64748B;
      --text-mid: #1E3A5F;
      --primary: #1D4ED8;
      --primary-2: #2563EB;
      --primary-3: #3B82F6;
      --primary-bg: rgba(59, 130, 246, 0.09);
      --border: rgba(59, 130, 246, 0.18);
      --border-lt: rgba(59, 130, 246, 0.11);
      --card-bg: #FFFFFF;
      --btn-sec-bg: rgba(255, 255, 255, 0.88);
      --badge-bg: rgba(255, 255, 255, 0.80);
      --shadow-nav: 0 4px 24px rgba(29, 78, 216, 0.08);
      --node-color: rgba(59, 130, 246, 0.50);
      --node-line: 59, 130, 246;
    }

    /* ── DARK THEME ── */
    [data-theme="dark"] {
      --bg: #07101F;
      --nav-bg: rgba(10, 18, 36, 0.90);
      --text-dark: #E8F0FF;
      --text-muted: #7A90B0;
      --text-mid: #93B4D4;
      --primary-bg: rgba(59, 130, 246, 0.14);
      --border: rgba(59, 130, 246, 0.22);
      --border-lt: rgba(59, 130, 246, 0.14);
      --card-bg: #0F1A2E;
      --btn-sec-bg: rgba(255, 255, 255, 0.06);
      --badge-bg: rgba(255, 255, 255, 0.07);
      --shadow-nav: 0 4px 24px rgba(0, 0, 0, 0.35);
      --node-color: rgba(96, 165, 250, 0.45);
      --node-line: 96, 165, 250;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── NAVBAR ─────────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 1200px;
      background: var(--nav-bg);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--border-lt);
      border-radius: 100px;
      padding: 10px 14px 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 999;
      box-shadow: var(--shadow-nav);
      transition: background 0.3s, border-color 0.3s;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text-dark);
      text-decoration: none;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }

    .nav-logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(140deg, #1D4ED8 0%, #3B82F6 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(29, 78, 216, 0.30);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 100px;
      transition: all 0.2s;
    }

    .nav-links a:hover {
      color: var(--primary);
      background: var(--primary-bg);
    }

    .nav-links a.active {
      color: var(--primary);
      font-weight: 600;
      background: var(--primary-bg);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-outline-nav {
      border: 1.5px solid var(--primary-3);
      color: var(--primary);
      background: transparent;
      padding: 7px 16px;
      border-radius: 100px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      transition: all 0.22s;
    }

    .btn-outline-nav:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    /* Dark/light toggle */
    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--primary-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.22s;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background: var(--primary-bg);
      color: var(--primary);
      border-color: var(--primary-3);
    }

    .theme-toggle .icon-moon,
    .theme-toggle .icon-sun {
      display: none;
    }

    [data-theme="light"] .theme-toggle .icon-moon {
      display: block;
    }

    [data-theme="dark"] .theme-toggle .icon-sun {
      display: block;
    }

    /* ── HERO ───────────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    #networkCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 130px 64px 100px;
      width: 100%;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--badge-bg);
      border: 1px solid var(--border-lt);
      border-radius: 100px;
      padding: 6px 16px 6px 9px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      margin-bottom: 34px;
      backdrop-filter: blur(12px);
    }

    .badge-dot {
      width: 21px;
      height: 21px;
      background: linear-gradient(135deg, #1D4ED8, #60A5FA);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hero-title {
      font-size: clamp(48px, 7vw, 80px);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -1.5px;
      margin-bottom: 26px;
      max-width: 640px;
    }

    .hero-title .accent {
      color: var(--primary-2);
    }

    .hero-desc {
      font-size: 16.5px;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 510px;
      margin-bottom: 44px;
      font-weight: 400;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: linear-gradient(140deg, #1D4ED8, #2563EB);
      color: #fff;
      border: none;
      padding: 14px 26px;
      border-radius: 100px;
      font-size: 14.5px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: all 0.28s;
      box-shadow: 0 6px 24px rgba(29, 78, 216, 0.36);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(29, 78, 216, 0.48);
    }

    .btn-secondary {
      background: var(--btn-sec-bg);
      color: var(--text-dark);
      border: 1.5px solid var(--border-lt);
      padding: 14px 26px;
      border-radius: 100px;
      font-size: 14.5px;
      font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: all 0.28s;
      backdrop-filter: blur(12px);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-2px);
    }

    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .navbar {
        width: calc(100% - 28px);
        top: 12px;
        padding: 9px 12px;
      }

      .nav-links {
        display: none;
      }

      .hero-content {
        padding: 108px 28px 70px;
      }

      .hero-title {
        letter-spacing: -0.8px;
      }
    }
  </style>
</head>

<body>

  <!-- ── NAVBAR ───────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 3C12 3 8 5 8 9C8 10.5 8.5 11.8 9.5 12.8C8.5 13.2 7 14.5 7 17C7 19.8 9.2 22 12 22C14.8 22 17 19.8 17 17C17 14.5 15.5 13.2 14.5 12.8C15.5 11.8 16 10.5 16 9C16 5 12 3 12 3Z"
            fill="white" />
          <path d="M12 3C10 3 5 6 5 11C5 14 6.5 16 8 17" stroke="white" stroke-width="1.5" stroke-linecap="round"
            opacity="0.5" fill="none" />
          <path d="M12 3C14 3 19 6 19 11C19 14 17.5 16 16 17" stroke="white" stroke-width="1.5" stroke-linecap="round"
            opacity="0.5" fill="none" />
        </svg>
      </div>
      Resonair
    </a>

    <ul class="nav-links">
      <li><a href="/" class="active">Home</a></li>
      <li><a href="/app.html">Launch App</a></li>
    </ul>

    <div class="nav-actions">
      <button class="btn-outline-nav">Patent-Pending Software</button>

      <!-- Dark / Light toggle -->
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">
        <!-- Moon (shown in light mode) -->
        <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <!-- Sun (shown in dark mode) -->
        <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- ── HERO ─────────────────────────────────────────────── -->
  <section class="hero">
    <canvas id="networkCanvas"></canvas>

    <div class="hero-content">
      <div class="hero-badge">
        <div class="badge-dot">
          <svg width="8" height="8" viewBox="0 0 10 10" fill="white">
            <circle cx="5" cy="5" r="3" />
          </svg>
        </div>
        Pioneering Respiratory Analytics
      </div>

      <h1 class="hero-title">
        Resonair AI
      </h1>

      <p class="hero-desc">
        Cough into your microphone and get instant AI-powered chest disease analysis.
        Our lab advances pulmonary health through computational methods and data-driven insights.
      </p>

      <div class="hero-btns">
        <a href="/app.html" class="btn-primary">
          Launch App
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </a>
      </div>
    </div>
  </section>

  <!-- ── SCRIPTS ────────────────────────────────────────────── -->
  <script>
    /* ── THEME TOGGLE ── */
    const html = document.documentElement;

    // Restore saved preference
    const saved = localStorage.getItem('resonair_theme');
    if (saved) html.setAttribute('data-theme', saved);

    function toggleTheme() {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('resonair_theme', next);
      // redraw canvas with new node color
      spawnNodes();
    }

    /* ── NETWORK CANVAS ── */
    const canvas = document.getElementById('networkCanvas');
    const ctx = canvas.getContext('2d');
    let nodes = [], W, H, animId;
    const MAX_D = 180;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function getNodeColor() {
      return html.getAttribute('data-theme') === 'dark'
        ? { dot: 'rgba(96,165,250,0.42)', line: '96,165,250' }
        : { dot: 'rgba(59,130,246,0.50)', line: '59,130,246' };
    }

    function spawnNodes() {
      nodes = [];
      const n = Math.max(36, Math.floor(W * H / 13500));
      for (let i = 0; i < n; i++) {
        nodes.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.30,
          vy: (Math.random() - 0.5) * 0.30,
          r: Math.random() * 2.5 + 1.8,
        });
      }
    }

    function tick() {
      ctx.clearRect(0, 0, W, H);
      const { dot, line } = getNodeColor();

      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        a.x += a.vx; a.y += a.vy;
        if (a.x < -12) a.x = W + 12;
        if (a.x > W + 12) a.x = -12;
        if (a.y < -12) a.y = H + 12;
        if (a.y > H + 12) a.y = -12;

        ctx.beginPath();
        ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
        ctx.fillStyle = dot;
        ctx.fill();

        if (a.r > 3.5) {
          ctx.save();
          ctx.translate(a.x, a.y);
          ctx.rotate(Math.PI / 4);
          ctx.strokeStyle = dot.replace('0.50', '0.28').replace('0.42', '0.25');
          ctx.lineWidth = 1;
          ctx.strokeRect(-2.6, -2.6, 5.2, 5.2);
          ctx.restore();
        }

        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < MAX_D * MAX_D) {
            const t = 1 - Math.sqrt(d2) / MAX_D;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(${line},${(t * 0.18).toFixed(3)})`;
            ctx.lineWidth = 0.85;
            ctx.stroke();
          }
        }
      }
      animId = requestAnimationFrame(tick);
    }

    resize(); spawnNodes(); tick();
    window.addEventListener('resize', () => { resize(); spawnNodes(); });
  </script>

</body>

</html>
